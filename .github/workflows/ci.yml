name: CI

on:
  push:
    branches: [main, light-theme-fix]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verse-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: verse-backend/go.mod
      - run: go test ./...

  frontend:
    name: Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verse-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: verse-web/package-lock.json
      - run: npm ci
      - run: npm test

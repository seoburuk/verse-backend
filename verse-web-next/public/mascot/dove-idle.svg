<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <!-- 몸통 실루엣(외곽선) -->
  <rect x="4" y="10" width="14" height="9" fill="#241f16"/>
  <rect x="14" y="4" width="7" height="7" fill="#241f16"/>
  <rect x="1" y="14" width="5" height="4" fill="#241f16"/>
  <!-- 머리 위 볏(피죤투풍) -->
  <rect x="15" y="1" width="2" height="3" fill="#241f16"/>
  <rect x="18" y="2" width="2" height="3" fill="#241f16"/>

  <!-- 몸통 채움 — 황갈색(삐죠 계열 톤) -->
  <rect x="5" y="11" width="12" height="7" fill="#c9995f"/>
  <!-- 머리 -->
  <rect x="15" y="5" width="5" height="5" fill="#c9995f"/>
  <!-- 꼬리 -->
  <rect x="2" y="15" width="3" height="2" fill="#c9995f"/>
  <!-- 볏(분홍) -->
  <rect x="15" y="2" width="2" height="3" fill="#e8879a"/>
  <rect x="18" y="3" width="2" height="3" fill="#e8879a"/>
  <!-- 접은 날개(짙은 갈색) -->
  <rect x="6" y="13" width="7" height="4" fill="#8a6a42"/>
  <!-- 배(크림) -->
  <rect x="6" y="15" width="5" height="3" fill="#f5f0e0"/>
  <!-- 부리 -->
  <rect x="20" y="7" width="2" height="2" fill="#e6b93d"/>
  <!-- 볼 무늬(분홍) -->
  <rect x="15" y="8" width="2" height="1" fill="#e8879a"/>
  <!-- 눈 -->
  <rect x="17" y="6" width="2" height="2" fill="#241f16"/>
</svg>

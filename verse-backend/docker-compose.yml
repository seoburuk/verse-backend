# 로컬 개발용: postgres + app. 개발 초기엔 postgres만 띄우고 app은 로컬 실행 권장.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pixelkjv
      POSTGRES_PASSWORD: pixelkjv_dev_pw
      POSTGRES_DB: pixelkjv
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # app:
  #   build: .
  #   depends_on: [db]
  #   ports: ["8080:8080"]
  #   environment:
  #     DATABASE_URL: postgres://pixelkjv:pixelkjv_dev_pw@db:5432/pixelkjv?sslmode=disable

volumes:
  pgdata:
